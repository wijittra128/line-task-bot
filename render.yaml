services:
  - type: web
    name: task-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: CHANNEL_ACCESS_TOKEN
        sync: false
      - key: CHANNEL_SECRET
        sync: false
      - key: USER_ID
        sync: false
      - key: DB_PATH
        value: tasks.db
